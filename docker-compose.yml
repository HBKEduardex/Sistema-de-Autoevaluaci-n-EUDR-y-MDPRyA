version: '3.8'

services:
  # 1. Contenedor Principal PHP-FPM (Aplicación)
  app-php:
    build:
      context: .
      dockerfile: docker/app-php/Dockerfile
    container_name: eudr_app_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/app-php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db-postgres:5432/${DB_NAME}?serverVersion=16&charset=utf8
      - MESSENGER_TRANSPORT_DSN=redis://redis:6379/messages
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_NAME=${MINIO_BUCKET}
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
    depends_on:
      - db-postgres
      - redis
    networks:
      - eudr_network

  # 2. Servidor Web Nginx
  web-nginx:
    image: nginx:1.25-alpine
    container_name: eudr_web_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - .:/var/www/html
      - ./docker/web-nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-php
    networks:
      - eudr_network

  # 3. Base de Datos PostgreSQL
  db-postgres:
    image: postgres:16-alpine
    container_name: eudr_db_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - eudr_network

  # 4. Redis (Caché, Sesiones, Cola de Mensajes)
  redis:
    image: redis:7-alpine
    container_name: eudr_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - eudr_network

  # 5. Worker PHP (Consumidor de Cola)
  worker-php:
    build:
      context: .
      dockerfile: docker/app-php/Dockerfile
    container_name: eudr_worker_php
    restart: unless-stopped
    command: php bin/console messenger:consume async -vv --time-limit=3600 --memory-limit=128M
    volumes:
      - .:/var/www/html
      - ./docker/app-php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db-postgres:5432/${DB_NAME}?serverVersion=16&charset=utf8
      - MESSENGER_TRANSPORT_DSN=redis://redis:6379/messages
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_NAME=${MINIO_BUCKET}
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
    depends_on:
      - app-php
      - db-postgres
      - redis
    networks:
      - eudr_network

  # 6. Almacenamiento MinIO (Evidencias)
  minio:
    image: minio/minio
    container_name: eudr_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    networks:
      - eudr_network

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

networks:
  eudr_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
